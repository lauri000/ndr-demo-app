name: IrisChat
options:
  bundleIdPrefix: social.innode.ndr.demo
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: social.innode.ndr.demo.ios
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    VERSIONING_SYSTEM: apple-generic
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: 5.0

targets:
  IrisChat:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Bindings
        excludes:
          - "*.h"
          - "*.modulemap"
    settings:
      base:
        PRODUCT_NAME: IrisChat
        DEFINES_MODULE: YES
        INFOPLIST_FILE: Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Iris Chat
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    dependencies:
      - framework: Frameworks/NdrDemoCore.xcframework
        embed: false

  IrisChatTests:
    type: bundle.unit-test
    platform: iOS
    settings:
      base:
        PRODUCT_NAME: "$(TARGET_NAME)"
        PRODUCT_MODULE_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: IrisChat
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/IrisChat.app/IrisChat"
        BUNDLE_LOADER: "$(TEST_HOST)"
    sources:
      - path: Tests
    dependencies:
      - target: IrisChat

  IrisChatUITests:
    type: bundle.ui-testing
    platform: iOS
    settings:
      base:
        PRODUCT_NAME: "$(TARGET_NAME)"
        PRODUCT_MODULE_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: UITests
    dependencies:
      - target: IrisChat
